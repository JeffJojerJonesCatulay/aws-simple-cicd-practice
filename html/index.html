<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern data dashboard displaying user information from a JSON source.">
    <title>User Data Dashboard | CI/CD Practice</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0c0a; /* Deep black-green */
            --card-bg: rgba(15, 20, 15, 0.8);
            --accent-color: #eab308; /* Amber Yellow */
            --accent-green: #22c55e; /* Vibrant Green */
            --accent-glow: rgba(234, 179, 8, 0.2);
            --text-primary: #f0fdf4; /* Off-white green tint */
            --text-secondary: #a3e635; /* Lime green */
            --border-color: rgba(163, 230, 53, 0.15);
            --hover-row: rgba(163, 230, 53, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(234, 179, 8, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(34, 197, 94, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            animation: fadeIn 0.8s ease-out;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #eab308, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        .table-responsive {
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) transparent;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.25rem 1.5rem;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        tr {
            transition: background-color 0.2s ease;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            color: var(--text-primary);
        }

        tr:hover {
            background-color: var(--hover-row);
        }

        /* ID Badge */
        .id-badge {
            background: rgba(234, 179, 8, 0.1);
            color: var(--accent-color);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.8rem;
            border: 1px solid rgba(234, 179, 8, 0.2);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Spinner */
        #loader {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5rem;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(163, 230, 53, 0.1);
            border-top: 3px solid var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            margin-top: 3rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            opacity: 0.6;
        }

        .email-link {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-bottom 0.2s;
        }

        .email-link:hover {
            border-bottom: 1px solid var(--accent-color);
        }

        .gender-pill {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            background: rgba(34, 197, 94, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>User Profiles</h1>
            <p class="subtitle">Real-time data synchronization from Mock Data Engine</p>
        </header>

        <main class="card" id="main-content">
            <div id="loader">
                <div class="spinner"></div>
                <p>Fetching data...</p>
            </div>
            
            <div class="table-responsive" style="display: none;" id="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Gender</th>
                            <th>Catch Phrase</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </main>

        <footer>
            &copy; 2026 AWS CI/CD Practice Dashboard. Built with Precision.
        </footer>
    </div>

    <script src="data/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.getElementById('table-body');
            const loader = document.getElementById('loader');
            const tableContainer = document.getElementById('table-container');

            try {
                // Use the global MOCK_DATA variable from data.js
                if (typeof MOCK_DATA === 'undefined') {
                    throw new Error('MOCK_DATA not found. Ensure data.js is loaded correctly.');
                }
                
                // Simulate a slight delay for aesthetic loading feel
                setTimeout(() => {
                    renderData(MOCK_DATA);
                    loader.style.display = 'none';
                    tableContainer.style.display = 'block';
                }, 800);

            } catch (error) {
                console.error('Error:', error);
                loader.innerHTML = `<p style="color: #ef4444;">Error loading data. ${error.message}</p>`;
            }

            function renderData(users) {
                tableBody.innerHTML = users.map(user => `
                    <tr>
                        <td><span class="id-badge">#${user.id}</span></td>
                        <td style="font-weight: 500; color: var(--text-primary);">
                            ${user.first_name} ${user.last_name}
                        </td>
                        <td>
                            <a href="mailto:${user.email}" class="email-link">${user.email}</a>
                        </td>
                        <td>
                            <span class="gender-pill">${user.gender}</span>
                        </td>
                        <td style="font-style: italic;">
                            "${user.catch_phrase}"
                        </td>
                    </tr>
                `).join('');
            }
        });
    </script>
</body>
</html>
